# Kasoku Cluster Node 1 - OPTIMIZED FOR HIGH THROUGHPUT
data_dir: ./data/node1
port: 9000
http_port: 9001
log_level: error
log_file: ""
lsm:
    levels: 5
    level_ratio: 10
    l0_base_size: 268435456
    key_cache_size: 1000000
compaction:
    threshold: 8
    max_concurrent: 4
    l0_size_threshold: 268435456
memory:
    memtable_size: 268435456
    max_memtable_bytes: 1073741824
    bloom_fp_rate: 0.01
    block_cache_size: 1073741824
wal:
    sync: false
    sync_interval: 100ms
    checkpoint_bytes: 1048576
    max_file_size: 67108864
cluster:
    enabled: true
    node_id: node-1
    node_addr: http://localhost:9000
    peers:
        - http://localhost:9001
        - http://localhost:9002
    replication_factor: 3
    quorum_size: 2
    read_quorum: 1
    vnodes: 150
    gossip_port: 9002
    raft_port: 9003
    rpc_timeout_ms: 500