version: '3.8'

services:
  kasoku-node1:
    build: .
    container_name: kasoku-node1
    hostname: node1
    ports:
      - "9001:9000"
    environment:
      - KASOKU_NODE_ID=node-1
      - KASOKU_HTTP_PORT=9000
      - KASOKU_CLUSTER_ENABLED=true
      - KASOKU_CLUSTER_PEERS=http://node2:9000,http://node3:9000
      - KASOKU_QUORUM_SIZE=1
      - KASOKU_READ_QUORUM=1
      - KASOKU_DATA_DIR=/data
      - GOMAXPROCS=2
      - GOMEMLIMIT=1GiB
    volumes:
      - kasoku1-data:/data
    networks:
      - kasoku-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  kasoku-node2:
    build: .
    container_name: kasoku-node2
    hostname: node2
    ports:
      - "9002:9000"
    environment:
      - KASOKU_NODE_ID=node-2
      - KASOKU_HTTP_PORT=9000
      - KASOKU_CLUSTER_ENABLED=true
      - KASOKU_CLUSTER_PEERS=http://node1:9000,http://node3:9000
      - KASOKU_QUORUM_SIZE=1
      - KASOKU_READ_QUORUM=1
      - KASOKU_DATA_DIR=/data
      - GOMAXPROCS=2
      - GOMEMLIMIT=1GiB
    volumes:
      - kasoku2-data:/data
    networks:
      - kasoku-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    depends_on:
      kasoku-node1:
        condition: service_healthy

  kasoku-node3:
    build: .
    container_name: kasoku-node3
    hostname: node3
    ports:
      - "9003:9000"
    environment:
      - KASOKU_NODE_ID=node-3
      - KASOKU_HTTP_PORT=9000
      - KASOKU_CLUSTER_ENABLED=true
      - KASOKU_CLUSTER_PEERS=http://node1:9000,http://node2:9000
      - KASOKU_QUORUM_SIZE=1
      - KASOKU_READ_QUORUM=1
      - KASOKU_DATA_DIR=/data
      - GOMAXPROCS=2
      - GOMEMLIMIT=1GiB
    volumes:
      - kasoku3-data:/data
    networks:
      - kasoku-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    depends_on:
      kasoku-node2:
        condition: service_healthy

  # Optional: Prometheus monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: kasoku-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - kasoku-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    profiles:
      - monitoring

  # Optional: Grafana dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: kasoku-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    networks:
      - kasoku-net
    profiles:
      - monitoring
    depends_on:
      - prometheus

volumes:
  kasoku1-data:
  kasoku2-data:
  kasoku3-data:
  prometheus-data:
  grafana-data:

networks:
  kasoku-net:
    driver: bridge
