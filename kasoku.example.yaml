# Kasoku Configuration File - Optimized for High Throughput
# =========================
# Copy this file to kasoku.yaml and customize for your environment.

# ------------------------------------------------------------------
# Server Settings
# ------------------------------------------------------------------

# Data directory for LSM storage (SSTables, WAL, manifests)
# Can also be set via KASOKU_DATA_DIR environment variable
data_dir: /var/lib/kasoku

# gRPC server port (for client connections)
# Can also be set via KASOKU_PORT environment variable
port: 9000

# HTTP server port (for REST API)
# Can also be set via KASOKU_HTTP_PORT environment variable
http_port: 9001

# Log level: debug, info, warn, error
# Can also be set via KASOKU_LOG_LEVEL environment variable
log_level: warn

# Log file path (empty = stdout)
# Can also be set via KASOKU_LOG_FILE environment variable
log_file: ""

# ------------------------------------------------------------------
# LSM Engine Settings (OPTIMIZED for high throughput)
# ------------------------------------------------------------------

lsm:
  # Number of levels in LSM tree
  levels: 5

  # Size ratio between consecutive levels (10x = fewer levels = faster)
  level_ratio: 10.0

  # Base size for L0 (bytes) - 256MB (optimized)
  l0_base_size: 268435456

  # Key cache size (1M entries for high cache hit rate)
  key_cache_size: 1000000

# ------------------------------------------------------------------
# Compaction Settings (OPTIMIZED)
# ------------------------------------------------------------------

compaction:
  # Number of SSTables to trigger compaction (increased from 4 to 8)
  threshold: 8

  # Maximum concurrent compactions
  max_concurrent: 4

  # Size threshold for L0 compaction (bytes) - 256MB
  l0_size_threshold: 268435456

# ------------------------------------------------------------------
# Memory Settings (OPTIMIZED for high throughput)
# ------------------------------------------------------------------

memory:
  # MemTable size in bytes (256MB - increased from 64MB)
  # Can also be set via KASOKU_MEMTABLE_SIZE environment variable
  memtable_size: 268435456

  # Maximum memory for all memtables (1GB - for holding more in-memory)
  max_memtable_bytes: 1073741824

  # Bloom filter false positive rate (0.01 = 1%)
  bloom_fp_rate: 0.01

  # Block cache size (1GB - increased from 128MB for better read cache)
  block_cache_size: 1073741824

# ------------------------------------------------------------------
# WAL (Write-Ahead Log) Settings (OPTIMIZED for throughput)
# ------------------------------------------------------------------

wal:
  # Async batch sync (false = async mode for throughput)
  sync: false

  # Sync interval in milliseconds (100ms = balance performance/durability)
  sync_interval: 100ms

  # Checkpoint interval in bytes (1MB - force sync after this much data)
  checkpoint_bytes: 1048576

  # WAL file size before rotation (64MB default)
  max_file_size: 67108864

# ------------------------------------------------------------------
# Cluster Settings (for distributed mode)
# ------------------------------------------------------------------

cluster:
  # Enable cluster mode
  enabled: false

  # Unique node ID
  node_id: node-1

  # Node address (for inter-node communication)
  node_addr: http://localhost:9000

  # Peer node addresses
  peers:
    - http://localhost:9001
    - http://localhost:9002

  # Gossip port (for node discovery)
  gossip_port: 9002

  # Raft port (for consensus)
  raft_port: 9003

  # Replication factor (number of replicas per key)
  replication_factor: 3

  # Quorum size (minimum acks required for write)
  quorum_size: 2

  # Read quorum (1 = eventual consistency for throughput, 2 = strong)
  read_quorum: 1

  # Virtual nodes per physical node (for consistent hashing)
  vnodes: 150

  # RPC timeout for inter-node communication (milliseconds) - reduced for faster failure detection
  rpc_timeout_ms: 500