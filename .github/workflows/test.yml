name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Show commit
        run: |
          echo "Commit: $(git log -1 --oneline)"
          echo "Files in kvctl/engine:"
          ls -la cmd/kvctl/engine/ 2>/dev/null || echo "NOT FOUND"
          echo "Files in kvctl/validate:"
          ls -la cmd/kvctl/validate/ 2>/dev/null || echo "NOT FOUND"
          git ls-files cmd/kvctl/engine cmd/kvctl/validate

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install dependencies
        run: |
          go mod download
          go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -short ./...