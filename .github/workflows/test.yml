name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show all handler files
        run: |
          echo "=== All Go files in cmd/server/handler ==="
          find cmd/server/handler -name "*.go" -type f
          echo "=== Git tracked files ==="
          git ls-files cmd/server/handler/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -short ./...