# Single Node Configuration for Testing
data_dir: ./data/node1
port: 9000
http_port: 9001
grpc_port: 9002
log_level: info

lsm:
    levels: 5
    level_ratio: 10
    l0_base_size: 67108864
    key_cache_size: 1000000

compaction:
    threshold: 8
    max_concurrent: 4
    l0_size_threshold: 268435456

memory:
    memtable_size: 268435456
    max_memtable_bytes: 536870912
    bloom_fp_rate: 0.01
    block_cache_size: 536870912

wal:
    sync: false
    sync_interval: 500ms
    checkpoint_bytes: 1073741824
    max_file_size: 67108864

cluster:
    enabled: false
    node_id: node-1
    node_addr: http://localhost:9000
    peers: []
    replication_factor: 1
    quorum_size: 1
    read_quorum: 1
    vnodes: 150
    rpc_timeout_ms: 1000