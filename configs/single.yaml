# Kasoku Single-Node Configuration - OPTIMIZED FOR HIGH THROUGHPUT

data_dir: ./data/single
port: 9000
http_port: 9000
log_level: info

lsm:
    levels: 5
    level_ratio: 10
    l0_base_size: 67108864
    key_cache_size: 1000000

compaction:
    threshold: 8
    max_concurrent: 4
    l0_size_threshold: 67108864

memory:
    memtable_size: 67108864
    max_memtable_bytes: 268435456
    bloom_fp_rate: 0.01
    block_cache_size: 1073741824

wal:
    sync: false
    sync_interval: 100ms
    checkpoint_bytes: 1048576
    max_file_size: 67108864

cluster:
    enabled: false
