# Single Node Read-Optimized Configuration
# Tuned for maximum read throughput
data_dir: ./data/node-1
port: 9000
http_port: 9000
log_level: error

lsm:
    levels: 5
    level_ratio: 10
    l0_base_size: 67108864
    key_cache_size: 2000000
    max_flush_workers: 4

compaction:
    threshold: 500
    max_concurrent: 2
    l0_size_threshold: 5368709120

memory:
    memtable_size: 67108864 # 64MB (smaller = faster flush to SSTables)
    max_memtable_bytes: 268435456 # 256MB max
    max_immutable: 5
    bloom_fp_rate: 0.001 # Lower FPR for fewer false positives
    block_cache_size: 2147483648 # 2GB (larger for reads)
    compression_enabled: false # Disable for read-heavy
    use_zstd: false

wal:
    sync: false
    sync_interval: 100ms
    checkpoint_bytes: 67108864
    max_file_size: 67108864

cluster:
    enabled: false
    node_id: node-1
    node_addr: http://localhost:9000
    peers: []
    replication_factor: 1
    quorum_size: 1
    read_quorum: 1
    vnodes: 150
    rpc_timeout_ms: 500