# 3-Node Cluster Configuration for Benchmarking
data_dir: ${KASOKU_DATA_DIR:-./data/node1}
port: ${KASOKU_PORT:-9000}
http_port: ${KASOKU_HTTP_PORT:-9000}
log_level: error

lsm:
    levels: 5
    level_ratio: 10
    l0_base_size: 67108864
    key_cache_size: 1000000

compaction:
    threshold: 8
    max_concurrent: 4
    l0_size_threshold: 268435456

memory:
    memtable_size: 268435456
    max_memtable_bytes: 536870912
    bloom_fp_rate: 0.01
    block_cache_size: 536870912

wal:
    sync: false
    sync_interval: 200ms
    checkpoint_bytes: 134217728
    max_file_size: 67108864

cluster:
    enabled: true
    node_id: ${KASOKU_NODE_ID:-node-1}
    node_addr: ${KASOKU_NODE_ADDR:-http://localhost:9000}
    peers:
        - http://localhost:9000
        - http://localhost:9001
        - http://localhost:9002
    replication_factor: 3
    quorum_size: 1
    read_quorum: 1
    vnodes: 150
    rpc_timeout_ms: 1000
