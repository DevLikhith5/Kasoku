# Kasoku Cluster Node 1 Configuration

data_dir: ./data/node1
port: 9000
http_port: 9000
log_level: error

lsm:
    levels: 5
    level_ratio: 10
    l0_base_size: 67108864
    key_cache_size: 1000000
    max_flush_workers: 4

compaction:
    threshold: 1000
    max_concurrent: 4
    l0_size_threshold: 10737418240

memory:
    memtable_size: 268435456
    max_memtable_bytes: 1073741824
    max_immutable: 10
    bloom_fp_rate: 0.01
    block_cache_size: 536870912
    compression_enabled: true
    use_zstd: true

wal:
    sync: false
    sync_interval: 100ms
    checkpoint_bytes: 67108864
    max_file_size: 67108864

cluster:
    enabled: true
    node_id: node-1
    node_addr: http://localhost:9000
    peers:
        - http://localhost:9000
        - http://localhost:9001
        - http://localhost:9002
    replication_factor: 3
    quorum_size: 1
    read_quorum: 1
    vnodes: 150
    rpc_timeout_ms: 500