# Single Node gRPC Configuration - Optimized
data_dir: ./data/node-1
port: 9000
http_port: 9000
grpc_port: 9002
grpc: true
log_level: error

lsm:
    levels: 6
    level_ratio: 10
    l0_base_size: 134217728
    key_cache_size: 2000000

compaction:
    threshold: 2000
    max_concurrent: 2
    l0_size_threshold: 21474836480

memory:
    memtable_size: 536870912
    max_memtable_bytes: 2147483648
    bloom_fp_rate: 0.005
    block_cache_size: 2147483648

wal:
    sync: false
    sync_interval: 100ms
    checkpoint_bytes: 268435456
    max_file_size: 134217728

cluster:
    enabled: false
    node_id: node-1
    node_addr: http://localhost:9000
    peers: []
    replication_factor: 1
    quorum_size: 1
    read_quorum: 1
    vnodes: 150
    rpc_timeout_ms: 500