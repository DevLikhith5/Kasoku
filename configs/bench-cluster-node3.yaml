# BENCHMARK CONFIG - 3-Node Cluster - Node 3 (Strong Consistency)
# W=2, R=2 — quorum-based strong consistency (W+R > N)
data_dir: ./data/bench-node3
port: 9020
http_port: 9021
grpc_port: 9102
log_level: warn

lsm:
    levels: 5
    level_ratio: 10
    l0_base_size: 67108864

compaction:
    threshold: 4
    max_concurrent: 4
    l0_size_threshold: 134217728

memory:
    memtable_size: 67108864
    max_memtable_bytes: 268435456
    bloom_fp_rate: 0.01
    block_cache_size: 67108864

wal:
    sync: false
    sync_interval: 100ms
    checkpoint_bytes: 67108864
    max_file_size: 67108864

cluster:
    enabled: true
    node_id: http://localhost:9021
    node_addr: http://localhost:9021
    grpc_addr: localhost:9102
    peers:
        - http://localhost:9001
        - http://localhost:9011
    peer_grpc:
        - localhost:9100
        - localhost:9101
    replication_factor: 3
    quorum_size: 2
    read_quorum: 2
    vnodes: 150
    rpc_timeout_ms: 5000
