# BENCHMARK CONFIG - 3-Node Cluster - Node 1
# YCSB-standard: small caches, durable WAL, realistic workload
data_dir: ./data/bench-node1
port: 9000
http_port: 9001
grpc_port: 9002
log_level: warn

lsm:
    levels: 5
    level_ratio: 10
    l0_base_size: 67108864
    key_cache_size: 10000

compaction:
    threshold: 4
    max_concurrent: 4
    l0_size_threshold: 134217728

memory:
    memtable_size: 16777216
    max_memtable_bytes: 33554432
    bloom_fp_rate: 0.01
    block_cache_size: 16777216

wal:
    sync: false
    sync_interval: 1s
    checkpoint_bytes: 67108864
    max_file_size: 67108864

cluster:
    enabled: true
    node_id: bench-node-1
    node_addr: http://localhost:9000
    grpc_addr: localhost:9002
    peers:
        - http://localhost:9010
        - http://localhost:9020
    peer_grpc:
        - localhost:9012
        - localhost:9022
    replication_factor: 3
    quorum_size: 1
    read_quorum: 1
    vnodes: 150
    rpc_timeout_ms: 5000
