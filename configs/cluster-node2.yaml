# Kasoku Cluster Node 2 Configuration

data_dir: ./data/node2
port: 9001
http_port: 9001
log_level: error

lsm:
    levels: 5
    level_ratio: 10
    l0_base_size: 67108864
    key_cache_size: 1000000

compaction:
    threshold: 8
    max_concurrent: 4
    l0_size_threshold: 67108864

memory:
    memtable_size: 67108864
    max_memtable_bytes: 268435456
    bloom_fp_rate: 0.01
    block_cache_size: 268435456

wal:
    sync: false
    sync_interval: 100ms
    checkpoint_bytes: 1048576
    max_file_size: 67108864

cluster:
    enabled: true
    node_id: node-2
    node_addr: http://localhost:9001
    peers:
        - http://localhost:9000
        - http://localhost:9001
        - http://localhost:9002
    replication_factor: 3
    quorum_size: 2
    read_quorum: 1
    vnodes: 150
    rpc_timeout_ms: 500