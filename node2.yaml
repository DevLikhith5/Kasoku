data_dir: ./data/node2
port: 8081
log_level: info
cluster:
    enabled: true
    node_id: node-2
    node_addr: http://localhost:8081
    peers:
        - http://localhost:8080
        - http://localhost:8082
    replication_factor: 3
    quorum_size: 2
    vnodes: 150
    rpc_timeout_ms: 3000
lsm:
    levels: 7
    level_ratio: 10
    l0_base_size: 67108864
compaction:
    threshold: 4
    max_concurrent: 2
    l0_size_threshold: 134217728
memory:
    memtable_size: 67108864
    max_memtable_bytes: 268435456
    bloom_fp_rate: 0.01
    block_cache_size: 134217728
wal:
    sync: false
    sync_interval: 100ms
    max_file_size: 67108864
